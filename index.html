<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="PropManager">
<meta name="theme-color" content="#0d1117">
<title>🏢 PropertyManager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,-apple-system,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
input,button,select,textarea{font-family:inherit}
#topbar{background:#161b22;border-bottom:1px solid #21262d;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;gap:8px}
#topbar h1{font-size:.95rem;font-weight:700}
#topbar h1 b{color:#58a6ff}
#sv{font-size:.68rem;color:#3fb950;opacity:0;transition:.3s;white-space:nowrap}
#sv.on{opacity:1}
input[type=month]{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:5px 9px;color:#e6edf3;font-size:.78rem;outline:none;color-scheme:dark}
#tabs{background:#161b22;border-bottom:1px solid #21262d;display:flex;overflow-x:auto}
.tab{flex:1;border:none;background:none;color:#8b949e;font-family:inherit;font-size:.7rem;font-weight:500;padding:9px 4px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;min-width:60px}
.tab.on{color:#58a6ff;font-weight:700;border-bottom-color:#58a6ff}
.tab span{display:block;font-size:.95rem;margin-bottom:2px}
#content{padding:14px 12px 100px;max-width:900px;margin:0 auto}
.pg{display:none}.pg.on{display:block}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:7px 13px;border:none;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;outline:none;white-space:nowrap}
.btn:active{opacity:.7}
.b-blue{background:#1f6feb;color:#fff}
.b-green{background:#238636;color:#fff}
.b-orange{background:#d29922;color:#fff}
.b-red{background:rgba(248,81,73,.12);color:#f85149;border:1px solid rgba(248,81,73,.2)}
.b-ghost{background:transparent;color:#8b949e;border:1px solid #30363d}
.b-sm{font-size:.7rem;padding:4px 9px}
.abar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.bcard{background:#161b22;border:1px solid #21262d;border-radius:10px;margin-bottom:12px;overflow:hidden}
.bhdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#0d1117;cursor:pointer;user-select:none}
.bnum{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700}
.chev{color:#484f58;font-size:.7rem;display:inline-block;transition:.2s}
.cls .chev{transform:rotate(-90deg)}
.cls .cbody{display:none}
.cbody{padding:12px}
.rcard{border:1px solid #30363d;border-radius:9px;margin-bottom:10px;overflow:hidden;background:#0d1117}
.rhdr{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:#161b22;flex-wrap:wrap;gap:6px}
.bsum{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;padding:10px 12px;border-bottom:1px solid #21262d}
.bsi{background:#0d1117;border-radius:7px;padding:7px 9px;text-align:center}
.bsi .bl{font-size:.58rem;color:#484f58;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.bsi .bv{font-size:.88rem;font-weight:700}
.mtbl{width:100%;border-collapse:collapse;font-size:.73rem}
.mtbl th{background:rgba(255,255,255,.03);color:#8b949e;padding:5px 7px;text-align:center;font-size:.58rem;text-transform:uppercase;font-weight:700}
.mtbl th:first-child{text-align:left;padding-left:11px}
.mtbl td{padding:6px 7px;border-bottom:1px solid rgba(255,255,255,.04);text-align:center;vertical-align:middle}
.mtbl td:first-child{text-align:left;padding-left:11px}
.mtbl input[type=number]{width:68px;background:#161b22;border:1px solid #30363d;border-radius:5px;padding:4px 5px;color:#e6edf3;font-size:.73rem;text-align:center;outline:none}
.mtbl input:focus{border-color:#58a6ff}
.dv{font-weight:700;color:#3fb950}.bv2{font-weight:700;color:#58a6ff}.zv{color:#484f58}.ev{color:#f85149}
.trow td{background:rgba(88,166,255,.06)!important;font-weight:700;border-top:1px solid rgba(88,166,255,.15)!important}
.amrow{display:flex;gap:5px;padding:7px 12px;background:rgba(255,255,255,.02);border-top:1px dashed #21262d;flex-wrap:wrap;align-items:center}
.amrow input{background:#0d1117;border:1px solid #30363d;border-radius:5px;padding:4px 7px;color:#e6edf3;font-size:.72rem;outline:none}
.prow{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-top:1px solid #21262d;flex-wrap:wrap;gap:6px}
.pbtn{border:none;border-radius:6px;padding:5px 11px;font-size:.7rem;font-weight:700;cursor:pointer;font-family:inherit}
.pbtn.rp{background:rgba(63,185,80,.15);color:#3fb950;border:1px solid rgba(63,185,80,.3)}
.pbtn.ru{background:rgba(248,81,73,.1);color:#f85149;border:1px solid rgba(248,81,73,.2)}
.pbtn.wp{background:rgba(88,166,255,.15);color:#58a6ff;border:1px solid rgba(88,166,255,.3)}
.pbtn.wu{background:rgba(248,81,73,.1);color:#f85149;border:1px solid rgba(248,81,73,.2)}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;align-items:center;justify-content:center;padding:14px}
.ov.on{display:flex!important}
.mbox{background:#161b22;border:1px solid #30363d;border-radius:14px;padding:20px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;animation:pop .18s ease}
@keyframes pop{from{transform:scale(.93);opacity:0}to{transform:scale(1);opacity:1}}
.mbox h3{font-size:.95rem;font-weight:700;margin-bottom:14px}
.frow{margin-bottom:11px}
.frow label{display:block;font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#8b949e;margin-bottom:4px}
.frow input{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:7px;padding:8px 11px;color:#e6edf3;font-size:.86rem;outline:none}
.frow input:focus{border-color:#58a6ff}
.macts{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.ocard{background:#161b22;border:1px solid #21262d;border-radius:10px;margin-bottom:9px;overflow:hidden}
.ohdr{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;cursor:pointer;flex-wrap:wrap;gap:8px}
.oav{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;flex-shrink:0}
.obody{padding:12px 14px;border-top:1px solid #21262d;display:none}
.otbl{width:100%;border-collapse:collapse;font-size:.73rem}
.otbl th{background:#0d1117;color:#8b949e;padding:6px 8px;text-align:left;font-size:.6rem;text-transform:uppercase;font-weight:700;border-bottom:1px solid #21262d}
.otbl td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
.badge{display:inline-flex;align-items:center;font-size:.66rem;font-weight:700;border-radius:5px;padding:2px 8px;cursor:pointer;border:none;font-family:inherit}
.badge.paid{background:rgba(63,185,80,.12);color:#3fb950}
.badge.unpaid{background:rgba(248,81,73,.12);color:#f85149}
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:9px;margin-bottom:14px}
.sc{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:12px}
.dep{background:rgba(110,64,201,.08);border:1px solid rgba(110,64,201,.25);border-radius:8px;padding:9px 12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.toast-el{position:fixed;bottom:75px;left:50%;transform:translateX(-50%) translateY(10px);background:#161b22;border:1px solid #30363d;border-radius:9px;padding:9px 18px;font-size:.78rem;font-weight:600;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.6);transition:.25s;opacity:0;pointer-events:none}
.toast-el.on{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:480px){.bsum{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="topbar">
  <h1>🏢 Property<b>Manager</b></h1>
  <div style="display:flex;align-items:center;gap:8px">
    <span id="sv">✅ Saved</span>
    <input type="month" id="MP" onchange="onMC(this.value)">
  </div>
</div>
<div id="tabs">
  <button class="tab on" onclick="go('b')" id="tab-b"><span>🏢</span>Billing</button>
  <button class="tab" onclick="go('o')" id="tab-o"><span>💰</span>Outstanding</button>
  <button class="tab" onclick="go('t')" id="tab-t"><span>👤</span>Tenants</button>
  <button class="tab" onclick="go('d')" id="tab-d"><span>📊</span>Dashboard</button>
</div>
<div id="content">
<div class="pg on" id="pg-b">
  <div class="abar">
    <button class="btn b-blue" onclick="OM('mAB')">＋ Building</button>
    <button class="btn b-ghost" onclick="copyLast()" style="font-size:.72rem">⬅ Last Month</button>
    <button class="btn b-green" onclick="doXL()">📊 Excel</button>
    <button class="btn b-orange" onclick="doPDF()">📄 PDF</button>
  </div>
  <div id="BL"></div>
</div>
<div class="pg" id="pg-o">
  <div style="margin-bottom:12px"><div style="font-weight:700;margin-bottom:3px">💰 Outstanding Balances</div><div style="font-size:.72rem;color:#8b949e">All unpaid rent + water across all months</div></div>
  <div class="sgrid" id="OS"></div>
  <div id="OL"></div>
</div>
<div class="pg" id="pg-t">
  <input type="text" id="TS" placeholder="🔍 Search…" oninput="renT()" style="width:100%;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:8px 12px;color:#e6edf3;font-size:.78rem;outline:none;margin-bottom:12px">
  <div id="TL"></div>
</div>
<div class="pg" id="pg-d">
  <div style="font-weight:700;margin-bottom:12px" id="dT">📊 Dashboard</div>
  <div class="sgrid" id="dS"></div>
  <div style="background:#161b22;border:1px solid #21262d;border-radius:10px;padding:13px;margin-bottom:11px">
    <div style="font-size:.8rem;font-weight:700;margin-bottom:11px">💰 Monthly Trend</div>
    <div style="display:flex;align-items:flex-end;gap:5px;height:90px;padding-bottom:16px" id="dC"></div>
  </div>
  <div style="background:#161b22;border:1px solid #21262d;border-radius:10px;padding:13px">
    <div style="font-size:.8rem;font-weight:700;margin-bottom:11px">🏆 Top Rooms</div>
    <div id="dTop"></div>
  </div>
</div>
</div>

<!-- MODALS -->
<div class="ov" id="mAB"><div class="mbox"><h3>🏢 Add Building</h3>
  <div class="frow"><label>Building Name</label><input type="text" id="ABN" placeholder="e.g. Block A"></div>
  <div class="macts"><button class="btn b-ghost" onclick="CM('mAB')">Cancel</button><button class="btn b-blue" onclick="addB()">Add</button></div>
</div></div>

<div class="ov" id="mAR"><div class="mbox"><h3>🏠 Add Room</h3>
  <input type="hidden" id="ARb">
  <div class="frow"><label>Room Number</label><input type="text" id="ARN" placeholder="e.g. 101"></div>
  <div class="frow"><label>Tenant Name</label><input type="text" id="ART" placeholder="e.g. Ravi Kumar"></div>
  <div class="frow"><label>Monthly Rent (₹)</label><input type="number" id="ARR" placeholder="5000"></div>
  <div class="frow"><label>Security Deposit (₹)</label><input type="number" id="ARD" placeholder="10000"></div>
  <div class="frow"><label>Move-in Date</label><input type="date" id="ARMi"></div>
  <div class="macts"><button class="btn b-ghost" onclick="CM('mAR')">Cancel</button><button class="btn b-blue" onclick="addR()">Add Room</button></div>
</div></div>

<div class="ov" id="mER"><div class="mbox"><h3>✏️ Edit Room</h3>
  <input type="hidden" id="ERb"><input type="hidden" id="ERr">
  <div class="frow"><label>Room Number</label><input type="text" id="ERN"></div>
  <div class="frow"><label>Tenant Name</label><input type="text" id="ERT"></div>
  <div class="frow"><label>Monthly Rent (₹)</label><input type="number" id="ERR"></div>
  <div class="frow"><label>Security Deposit (₹)</label><input type="number" id="ERD"></div>
  <div class="frow"><label>Move-in Date</label><input type="date" id="ERMi"></div>
  <div class="macts"><button class="btn b-ghost" onclick="CM('mER')">Cancel</button><button class="btn b-blue" onclick="saveER()">Save</button></div>
</div></div>

<div class="ov" id="mRB"><div class="mbox"><h3>✏️ Rename Building</h3>
  <input type="hidden" id="RBi">
  <div class="frow"><label>Name</label><input type="text" id="RBN"></div>
  <div class="macts"><button class="btn b-ghost" onclick="CM('mRB')">Cancel</button><button class="btn b-blue" onclick="saveRB()">Save</button></div>
</div></div>

<div class="toast-el" id="TT"></div>

<script>
'use strict';
var S={buildings:[]},PAY={},lastM=null;
var PAL=['#58a6ff','#3fb950','#d29922','#a78bfa','#f85149','#ffd166'];
var BC=[{bg:'rgba(88,166,255,.15)',tx:'#58a6ff'},{bg:'rgba(63,185,80,.15)',tx:'#3fb950'},{bg:'rgba(210,153,34,.15)',tx:'#d29922'},{bg:'rgba(167,139,250,.15)',tx:'#a78bfa'},{bg:'rgba(248,81,73,.15)',tx:'#f85149'}];
var MOS=['January','February','March','April','May','June','July','August','September','October','November','December'];

// ── GOOGLE SHEETS SYNC ────────────────────────────
var SCRIPT_URL='https://script.google.com/macros/s/AKfycbyQvai32XBdjl4tpJcK7vG5L3LvJrDqAMN0ZPdOKd2-wCguA7MoqVpyFeredNtPH8W8/exec';
var SHEET_ID='1LQZhC8UjRB0xX2JHD8NLyIrJefbaxebP_d-DCOaTPdY';
var syncTimer=null;

function pushCloud(){
  clearTimeout(syncTimer);
  syncTimer=setTimeout(function(){
    var allRd={};
    for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.startsWith('pm_r_'))allRd[k]=localStorage.getItem(k);}
    var payload={s:JSON.stringify(S),p:JSON.stringify(PAY),month:ge('MP').value,rd:allRd,ts:Date.now()};
    fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({sheetId:SHEET_ID,action:'save',payload:JSON.stringify(payload)})})
      .then(function(){toast('☁️ Synced to Google Sheet!');})
      .catch(function(){});
  },2000);
}

function pullCloud(){
  return fetch(SCRIPT_URL+'?sheetId='+SHEET_ID)
    .then(function(r){return r.text();})
    .then(function(t){if(!t||t==='')return null;try{return JSON.parse(t);}catch(e){return null;}})
    .catch(function(){return null;});
}

// ── HELPERS ───────────────────────────────────────
function uid(){return'_'+Math.random().toString(36).substr(2,9);}
function ge(id){return document.getElementById(id);}
function fmt(m){if(!m)return'';var p=m.split('-');return MOS[+p[1]-1]+' '+p[0];}
function fmtS(m){if(!m)return'';var p=m.split('-');return MOS[+p[1]-1].slice(0,3)+' '+p[0].slice(2);}
function curM(){return ge('MP').value;}
function toast(msg){var t=ge('TT');t.textContent=msg;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('on');},3000);}
function saved(msg){var t=ge('sv');t.textContent=msg||'✅ Saved';t.classList.add('on');setTimeout(function(){t.classList.remove('on');},2000);}
function OM(id){ge(id).classList.add('on');}
function CM(id){ge(id).classList.remove('on');}
document.addEventListener('click',function(e){if(e.target.classList.contains('ov'))e.target.classList.remove('on');});
function go(p){
  ['b','o','t','d'].forEach(function(x){var pg=ge('pg-'+x),tb=ge('tab-'+x);if(pg)pg.classList.toggle('on',x===p);if(tb)tb.classList.toggle('on',x===p);});
  if(p==='o')renO();if(p==='t')renT();if(p==='d')renD();
}

// ── MONTH ─────────────────────────────────────────
function onMC(v){
  if(lastM)save(lastM);
  lastM=v;localStorage.setItem('pm_month',v);
  var saved_rd=lsGet('pm_r_'+v);
  if(saved_rd){applyRd(saved_rd);}
  else{
    var prev=lsGet('pm_r_'+getPK(v));
    if(prev){
      S.buildings.forEach(function(b){b.rooms.forEach(function(r){r.meters.forEach(function(mt){var x=prev[r.id]&&prev[r.id][mt.id];mt.last=x?(x.curr||''):'';mt.curr='';});});});
      toast('✅ Last month readings auto-loaded!');
    }else{
      S.buildings.forEach(function(b){b.rooms.forEach(function(r){r.meters.forEach(function(mt){mt.last='';mt.curr='';});});});
    }
  }
  renB();toast('📅 '+fmt(v));
}

function getPK(m){var p=m.split('-').map(Number);var pm=p[1]===1?12:p[1]-1,py=p[1]===1?p[0]-1:p[0];return py+'-'+String(pm).padStart(2,'0');}

function applyRd(rd){
  S.buildings.forEach(function(b){b.rooms.forEach(function(r){r.meters.forEach(function(mt){var x=rd[r.id]&&rd[r.id][mt.id];mt.last=x?x.last:'';mt.curr=x?x.curr:'';});});});
}

// ── SAVE / LOAD ───────────────────────────────────
function lsGet(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

function save(m){
  if(!m)return;
  lsSet('pm_s',S);lsSet('pm_p',PAY);localStorage.setItem('pm_month',m);
  var rd={};S.buildings.forEach(function(b){b.rooms.forEach(function(r){r.meters.forEach(function(mt){if(!rd[r.id])rd[r.id]={};rd[r.id][mt.id]={last:mt.last||'',curr:mt.curr||''};});});});
  lsSet('pm_r_'+m,rd);localStorage.setItem('pm_ts',Date.now().toString());
  saved('✅ Saved');pushCloud();
}

function copyLast(){
  var m=curM();if(!m){toast('Select month');return;}
  var prev=lsGet('pm_r_'+getPK(m));
  if(prev){S.buildings.forEach(function(b){b.rooms.forEach(function(r){r.meters.forEach(function(mt){var x=prev[r.id]&&prev[r.id][mt.id];mt.last=x?(x.curr||x.last||''):'';mt.curr='';});});});renB();save(m);toast('✅ Last month readings loaded!');}
  else toast('⚠️ No previous month data');
}

function allMs(){var ms=[];for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.startsWith('pm_r_'))ms.push(k.replace('pm_r_',''));}return ms.sort();}
function getMS(m){var st=lsGet('pm_s');if(!st)return null;var rd=lsGet('pm_r_'+m);if(rd){st.buildings.forEach(function(b){b.rooms.forEach(function(r){r.meters.forEach(function(mt){var x=rd[r.id]&&rd[r.id][mt.id];mt.last=x?x.last:'';mt.curr=x?x.curr:'';});});});}return st;}

// Emergency save
function esave(){try{save(ge('MP').value||lastM);}catch(e){}}
window.addEventListener('beforeunload',esave);
window.addEventListener('pagehide',esave);
document.addEventListener('visibilitychange',function(){if(document.visibilityState==='hidden')esave();});
setInterval(esave,8000);

// ── CALC ──────────────────────────────────────────
function mBill(m){var d=Math.max(0,(+m.curr||0)-(+m.last||0));return d*(+m.rate||0);}
function wBill(r){return r.meters.reduce(function(s,m){return s+mBill(m);},0);}
function rTotal(r){return(+r.rent||0)+wBill(r);}
function bTotal(b){return b.rooms.reduce(function(s,r){return s+rTotal(r);},0);}
function gPS(rid,m){return PAY[rid]&&PAY[rid][m]?PAY[rid][m]:{rent:'unpaid',water:'unpaid'};}

// ── MUTATIONS ─────────────────────────────────────
function addB(){var n=ge('ABN').value.trim();if(!n){alert('Enter name');return;}S.buildings.push({id:uid(),name:n,rooms:[]});ge('ABN').value='';CM('mAB');renB();save(curM());toast('🏢 "'+n+'" added!');}
function oAR(bid){ge('ARb').value=bid;ge('ARN').value='';ge('ART').value='';ge('ARR').value='';ge('ARD').value='';ge('ARMi').value='';OM('mAR');}
function addR(){var bid=ge('ARb').value,n=ge('ARN').value.trim();if(!n){alert('Enter room');return;}var b=S.buildings.find(function(x){return x.id===bid;});if(!b)return;b.rooms.push({id:uid(),name:n,tenant:ge('ART').value.trim(),rent:+ge('ARR').value||0,deposit:+ge('ARD').value||0,moveIn:ge('ARMi').value,meters:[]});ge('ARN').value='';ge('ART').value='';ge('ARR').value='';ge('ARD').value='';ge('ARMi').value='';CM('mAR');renB();save(curM());toast('🏠 Room added!');}
function oER(bid,rid){var b=S.buildings.find(function(x){return x.id===bid;});var r=b&&b.rooms.find(function(x){return x.id===rid;});if(!r)return;ge('ERb').value=bid;ge('ERr').value=rid;ge('ERN').value=r.name;ge('ERT').value=r.tenant||'';ge('ERR').value=r.rent||'';ge('ERD').value=r.deposit||'';ge('ERMi').value=r.moveIn||'';OM('mER');}

  rooms.forEach(function(x){var ps=gPS(x.r.id,m);if(ps.rent==='paid')coll+=(+x.r.rent||0);else due+=(+x.r.rent||0);if(ps.water==='paid')coll+=wBill(x.r);else due+=wBill(x.r);});
  ge('dS').innerHTML='<div class="sc"><div style="font-size:1.2rem;margin-bottom:6px">💰</div><div style="font-size:1.2rem;font-weight:700;color:#58a6ff">₹'+tBill.toFixed(0)+'</div><div style="font-size:.65rem;color:#8b949e;margin-top:3px">Total Bill</div></div><div class="sc"><div style="font-size:1.2rem;margin-bottom:6px">✅</div><div style="font-size:1.2rem;font-weight:700;color:#3fb950">₹'+coll.toFixed(0)+'</div><div style="font-size:.65rem;color:#8b949e;margin-top:3px">Collected</div></div><div class="sc"><div style="font-size:1.2rem;margin-bottom:6px">⚠️</div><div style="font-size:1.2rem;font-weight:700;color:#f85149">₹'+due.toFixed(0)+'</div><div style="font-size:.65rem;color:#8b949e;margin-top:3px">Pending</div></div><div class="sc"><div style="font-size:1.2rem;margin-bottom:6px">🏠</div><div style="font-size:1.2rem;font-weight:700;color:#d29922">'+rooms.length+'</div><div style="font-size:.65rem;color:#8b949e;margin-top:3px">Rooms</div></div>';
  var ms=allMs().slice(-8),mxV=1;
  var mdata=ms.map(function(mo){var sv=getMS(mo);if(!sv)return{l:fmtS(mo),v:0};var tot=sv.buildings.reduce(function(s,b){return s+b.rooms.reduce(function(s2,r){var wb=r.meters.reduce(function(s3,mt){var d=Math.max(0,(+mt.curr||0)-(+mt.last||0));return s3+d*(+mt.rate||0);},0);return s2+(+r.rent||0)+wb;},0);},0);if(tot>mxV)mxV=tot;return{l:fmtS(mo),v:tot};});
  ge('dC').innerHTML=mdata.map(function(d,i){var h=Math.max(3,d.v/mxV*78);return'<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;height:100%;justify-content:flex-end"><div style="font-size:.54rem;color:#8b949e;font-weight:600">'+(d.v>999?(d.v/1000).toFixed(1)+'k':d.v.toFixed(0))+'</div><div style="width:100%;height:'+h+'px;background:'+PAL[i%PAL.length]+';border-radius:4px 4px 0 0"></div><div style="font-size:.54rem;color:#484f58;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%">'+d.l+'</div></div>';}).join('');
  var topR=rooms.map(function(x){return{bldg:x.b.name,room:x.r,bill:rTotal(x.r)};}).sort(function(a,b){return b.bill-a.bill;}).slice(0,5);
  var mxR=Math.max.apply(null,topR.map(function(h){return h.bill;}).concat([1]));
  ge('dTop').innerHTML=topR.length?topR.map(function(h,i){return'<div style="display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04)"><div style="width:19px;height:19px;border-radius:50%;background:'+PAL[i]+'22;color:'+PAL[i]+';display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700">'+(i+1)+'</div><div style="flex:1;min-width:0"><div style="font-size:.76rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">Room '+h.room.name+' <span style="color:#484f58;font-size:.66rem">'+h.bldg+'</span></div><div style="background:#21262d;border-radius:2px;height:4px;margin-top:3px"><div style="width:'+(h.bill/mxR*100).toFixed(1)+'%;background:'+PAL[i]+';border-radius:2px;height:4px"></div></div></div><div style="font-weight:700;font-size:.8rem;color:'+PAL[i]+'">₹'+h.bill.toFixed(0)+'</div></div>';}).join(''):'<div style="color:#484f58;font-size:.76rem">No data yet</div>';
}

// ── EXCEL ──────────────────────────────────────────
function doXL(){
  if(typeof XLSX==='undefined'){var s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=doXL;document.head.appendChild(s);toast('⏳ Loading…');return;}
  var wb=XLSX.utils.book_new(),ms=allMs();
  function H(v,bg){return{v:v,t:'s',s:{font:{bold:true,color:{rgb:'FFFFFF'},sz:10},fill:{fgColor:{rgb:bg||'1F3A5F'}},alignment:{horizontal:'center'}}};}
  function T(v){return{v:v||'',t:'s',s:{font:{sz:10}}};}
  function M(v){return{v:+v||0,t:'n',s:{numFmt:'#,##0.00',font:{color:{rgb:'166534'},sz:10},alignment:{horizontal:'right'}}};}
  var rows=[[H('PROPERTY MANAGER BILLS','0F2744'),'','','','','','','',''],[''],
    [H('Month'),H('Building'),H('Room'),H('Tenant'),H('Rent'),H('Water'),H('Total'),H('Rent Status'),H('Water Status')]];
  ms.forEach(function(m){var sv=getMS(m);if(!sv)return;sv.buildings.forEach(function(b){b.rooms.forEach(function(r){var wb=r.meters.reduce(function(s,mt){var d=Math.max(0,(+mt.curr||0)-(+mt.last||0));return s+d*(+mt.rate||0);},0);var rr=+r.rent||0,ps=gPS(r.id,m);rows.push([T(fmt(m)),T(b.name),T(r.name),T(r.tenant||''),M(rr),M(wb),M(rr+wb),T(ps.rent==='paid'?'✓ Paid':'✗ Unpaid'),T(ps.water==='paid'?'✓ Paid':'✗ Unpaid')]);});});rows.push([]);});
  var ws=XLSX.utils.aoa_to_sheet(rows);ws['!cols']=[{wch:18},{wch:14},{wch:10},{wch:18},{wch:12},{wch:12},{wch:12},{wch:12},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws,'Bills');
  var oRows=[[H('OUTSTANDING','0F2744'),'','','',''],[''],
    [H('Building'),H('Room'),H('Tenant'),H('Rent/mo'),H('Deposit'),H('Outstanding')]];
  S.buildings.forEach(function(b){b.rooms.forEach(function(r){var due=0;ms.forEach(function(m){var sv=getMS(m);if(!sv)return;var sb=sv.buildings.find(function(x){return x.id===b.id;});var sr=sb&&sb.rooms.find(function(x){return x.id===r.id;});if(!sr)return;var wb=sr.meters.reduce(function(s,mt){var d=Math.max(0,(+mt.curr||0)-(+mt.last||0));return s+d*(+mt.rate||0);},0);var ps=gPS(r.id,m);due+=(ps.rent!=='paid'?+sr.rent||0:0)+(ps.water!=='paid'?wb:0);});oRows.push([T(b.name),T(r.name),T(r.tenant||''),M(r.rent||0),M(r.deposit||0),M(due)]);});});
  var ws2=XLSX.utils.aoa_to_sheet(oRows);ws2['!cols']=[{wch:14},{wch:10},{wch:18},{wch:12},{wch:14},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws2,'Outstanding');
  XLSX.writeFile(wb,'PropManager_'+new Date().toISOString().slice(0,10)+'.xlsx');
  toast('✅ Excel downloaded!');
}

// ── PDF ────────────────────────────────────────────

  html+='<div class="cov"><h1>🏢 Property Manager Report</h1><p>'+now+'</p></div>';
  ms.forEach(function(m){var sv=getMS(m);if(!sv)return;var tR=0,tW=0,pc=0,uc=0;sv.buildings.forEach(function(b){b.rooms.forEach(function(r){var wb=r.meters.reduce(function(s,mt){var d=Math.max(0,(+mt.curr||0)-(+mt.last||0));return s+d*(+mt.rate||0);},0);tR+=(+r.rent||0);tW+=wb;var ps=gPS(r.id,m);if(ps.rent==='paid'&&ps.water==='paid')pc++;else uc++;});});html+='<div class="ms"><div class="mt">📅 '+fmt(m)+'</div><div class="sr"><div class="sb"><div class="v">₹'+(tR+tW).toFixed(2)+'</div><div class="l">Total</div></div><div class="sb"><div class="v">₹'+tR.toFixed(2)+'</div><div class="l">Rent</div></div><div class="sb"><div class="v">₹'+tW.toFixed(2)+'</div><div class="l">Water</div></div><div class="sb"><div class="v" style="color:#166534">'+pc+'</div><div class="l">Paid</div></div><div class="sb"><div class="v" style="color:#991b1b">'+uc+'</div><div class="l">Unpaid</div></div></div>';sv.buildings.forEach(function(b){html+='<div style="font-weight:bold;font-size:10px;color:#555;margin:7px 0 3px">🏢 '+b.name+'</div><table><thead><tr><th>Room</th><th>Tenant</th><th class="ra">Rent</th><th class="ra">Water</th><th class="ra">Total</th><th>Rent</th><th>Water</th></tr></thead><tbody>';b.rooms.forEach(function(r){var wb=r.meters.reduce(function(s,mt){var d=Math.max(0,(+mt.curr||0)-(+mt.last||0));return s+d*(+mt.rate||0);},0);var rr=+r.rent||0,ps=gPS(r.id,m);html+='<tr><td>'+r.name+'</td><td>'+(r.tenant||'—')+'</td><td class="ra">₹'+rr.toFixed(2)+'</td><td class="ra">₹'+wb.toFixed(2)+'</td><td class="ra">₹'+(rr+wb).toFixed(2)+'</td><td class="'+(ps.rent==='paid'?'paid':'unpaid')+'">'+(ps.rent==='paid'?'✓ Paid':'✗ Unpaid')+'</td><td class="'+(ps.water==='paid'?'paid':'unpaid')+'">'+(ps.water==='paid'?'✓ Paid':'✗ Unpaid')+'</td></tr>';});html+='</tbody></table>';});html+='<div class="ft">PropertyManager · '+fmt(m)+'</div></div>';});
  html+='</body></html>';
  var w=window.open('','_blank');w.document.write(html);w.document.close();w.focus();setTimeout(function(){w.print();},700);toast('📄 PDF ready');

// ── INIT ───────────────────────────────────────────
(function(){
  // Load local data first (instant)
  var st=lsGet('pm_s');if(st)S=JSON.parse(JSON.stringify(st));
  var py=lsGet('pm_p');if(py)PAY=JSON.parse(JSON.stringify(py));
  var now=new Date(),defM=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  var m=localStorage.getItem('pm_month')||defM;
  ge('MP').value=m;lastM=m;
  var rd=lsGet('pm_r_'+m);if(rd)applyRd(rd);
  renB();
  if(S.buildings.length>0){var c=S.buildings.reduce(function(s,b){return s+b.rooms.length;},0);setTimeout(function(){toast('✅ Loaded: '+S.buildings.length+' buildings, '+c+' rooms');},400);}

  // Pull from Google Sheets (may have newer data)
  pullCloud().then(function(cloud){
    if(!cloud||!cloud.s)return;
    var localTs=parseInt(localStorage.getItem('pm_ts')||'0');
    var localEmpty=!S.buildings||S.buildings.length===0;
    if(localEmpty||(cloud.ts&&cloud.ts>localTs+5000)){
      try{
        S=JSON.parse(cloud.s);
        PAY=cloud.p?JSON.parse(cloud.p):{};
        if(cloud.rd){Object.keys(cloud.rd).forEach(function(k){localStorage.setItem(k,cloud.rd[k]);});}
        lsSet('pm_s',S);lsSet('pm_p',PAY);
        if(cloud.month){localStorage.setItem('pm_month',cloud.month);ge('MP').value=cloud.month;lastM=cloud.month;}
        if(cloud.ts)localStorage.setItem('pm_ts',cloud.ts);
        var m2=ge('MP').value;var rd2=lsGet('pm_r_'+m2);if(rd2)applyRd(rd2);
        renB();
        var c2=S.buildings.reduce(function(s,b){return s+b.rooms.length;},0);
        toast('☁️ Loaded from Google Sheet: '+S.buildings.length+' buildings, '+c2+' rooms');
      }catch(e){}
    }
  });
})();
